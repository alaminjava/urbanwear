services:
  - type: web
    name: schooladmin
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: EducationManagement
      - key: JWT_SECRET
        generateValue: true
      - key: ENABLE_DEMO_ACCOUNTS
        value: true
      - key: ENABLE_DEMO_DATA
        value: true
      - key: CORS_ORIGIN
        sync: false
